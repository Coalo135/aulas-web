<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Matrícula - FATEC</title>
</head>
<body>

<h1>Formulário de Matrícula - FATEC</h1>

<form>

    <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="nome">Nome completo:</label><br>
        <input type="text" id="nome" name="nome" required minlength="5"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="data">Data de nascimento:</label><br>
        <input type="date" id="data" name="data"><br><br>

        <label for="cpf">CPF:</label><br>
        <input type="text" id="cpf" name="cpf"
            pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
            placeholder="000.000.000-00"><br><br>
            
        <label for="foto">Foto:</label><br>
        <input type="file" id="foto" name="foto" accept="image/*"><br><br>

        <label for="cor">Cor favorita:</label><br>
        <input type="color" id="cor" name="cor"><br><br>

    </fieldset>

    <br>
    <fieldset>
        <legend>Dados Acadêmicos</legend>

        <label for="curso">Curso:</label><br>
        <select id="curso" name="curso">
            <option value="">Selecione</option>
            <option value="ads">Análise e Desenvolvimento de Sistemas</option>
            <option value="logistica">Logística</option>
            <option value="gestao">Gestão Empresarial</option>
        </select><br><br>

        <p>Período:</p>
        <input type="radio" id="manha" name="periodo" value="manha">
        <label for="manha">Manhã</label><br>

        <input type="radio" id="noite" name="periodo" value="noite">
        <label for="noite">Noite</label><br><br>

        <input type="checkbox" id="programacao" name="programacao">
        <label for="programacao">Já programou antes?</label><br>

    </fieldset>

    <br>
    <label for="obs">Observações:</label><br>
    <textarea id="obs" name="obs" rows="4" cols="50"></textarea><br><br>

    <button type="submit">Enviar</button>

</form>

</body>
</html>
