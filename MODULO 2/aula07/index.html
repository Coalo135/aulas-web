<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">MinhaLogo</div>

    <nav>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="hero">
        <h1>Bem-vindo ao meu site</h1>
    </section>

    <section class="cards">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
    </section>

    <section class="layout">
        <aside class="sidebar">
            <h3>Menu</h3>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </aside>

        <div class="content">
            <h2>Conteúdo principal</h2>
            <p>Paragrafo da pagina</p>
        </div>
    </section>

</main>

<footer>
    <p>FATEC 2026</p>
</footer>

</body>
</html>
